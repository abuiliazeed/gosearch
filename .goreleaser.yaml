# .goreleaser.yaml
# https://goreleaser.com

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/gosearch
    binary: gosearch
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - .gosearch.yaml.example

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: abuiliazeed
    name: gosearch
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## gosearch {{ .Tag }}
    
    A self-hosted search engine for AI agents.
    
    ### Installation
    
    ```bash
    # macOS/Linux
    curl -sSL https://github.com/abuiliazeed/gosearch/releases/download/{{ .Tag }}/gosearch_{{ .Version }}_$(uname -s)_$(uname -m).tar.gz | tar xz
    sudo mv gosearch /usr/local/bin/
    ```
    
    ### What's Changed
    
  footer: |
    
    **Full Changelog**: https://github.com/abuiliazeed/gosearch/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: gosearch
    homepage: "https://github.com/abuiliazeed/gosearch"
    description: "A self-hosted search engine for AI agents"
    license: "MIT"
    repository:
      owner: abuiliazeed
      name: homebrew-tap
      branch: main
    commit_author:
      name: Ahmed
      email: abuiliazeed@gmail.com
    directory: Formula
    test: |
      system "#{bin}/gosearch", "version"
    install: |
      bin.install "gosearch"
