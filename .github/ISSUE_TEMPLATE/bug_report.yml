name: Bug Report
description: File a bug report to help us improve gosearch
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the form below.

  - type: input
    id: gosearch-version
    attributes:
      label: gosearch version
      description: What version of gosearch are you using? (Run `./bin/gosearch --version` or check git commit)
      placeholder: "e.g., v0.1.0 or commit abc123"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: What version of Go are you using?
      placeholder: "e.g., go1.21.5"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of gosearch is affected?
      options:
        - Crawler
        - Indexer
        - Search
        - CLI/TUI
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: "When I try to crawl..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear description of what you expected to happen.
      placeholder: "The crawler should..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: A clear description of what actually happened.
      placeholder: "Instead, the crawler..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      description: Paste any relevant logs, error messages, or stack traces below.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any other relevant environment details (OS, Redis version, etc.)
      placeholder: |
        OS: macOS 14.0
        Redis: 7.2.3 (Docker)
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: "I tried running with different flags and..."
    validations:
      required: false
