version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.24"

linters:
  enable:
    - govet
    - unused
    - ineffassign
    - misspell
    - unconvert
    - prealloc
    - copyloopvar
  disable:
    - funlen
    - wsl
    - lll
    - err113
    - errcheck
    - gocyclo
    - godot
    - gocritic
    - gosec
    - unparam
    - staticcheck
    - revive

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  new: false
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

  exclusions:
    generated: lax
    paths:
      - bin
      - data
      - dist
      - ".*\\.pb\\.go$"
    rules:
      # Exclude gosec and errcheck for test files
      - path: ".*_test.go"
        linters: [errcheck, gosec]
      # Gosec exclusions per task requirements
      - linters: [gosec]
        text: "G104"
      - linters: [gosec]
        text: "G115"
      - linters: [gosec]
        text: "G204"
      - linters: [gosec]
        text: "G301"
      - linters: [gosec]
        text: "G304"
      - linters: [gosec]
        text: "G306"
      - linters: [gosec]
        text: "G706"
      # Staticcheck exclusions per task requirements
      - linters: [staticcheck]
        text: "SA9003"
      - linters: [staticcheck]
        text: "QF1003"
      - linters: [staticcheck]
        text: "QF1012"
      # Revive exclusions per task requirements
      - linters: [revive]
        text: "exported"
      - linters: [revive]
        text: "redefines-builtin-id"
