# golangci-lint configuration for gosearch
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # Timeout for analysis
  timeout: 5m

  # Include test files
  tests: true

  # Go version to use
  go: "1.24"

output:
  formats:
    text:
      # Print lines of code with issue
      print-issued-lines: true
      # Print linter name in the end of issue text
      print-linter-name: true

linters:
  # Enable specific linters
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - gosec
    - revive
    - unconvert
    - unparam
    - prealloc
    - copyloopvar

  # Disable specific linters
  disable:
    - funlen  # We have longer test functions
    - wsl     # Whitespace linter - too opinionated
    - lll     # Line length linter - we use reasonable line lengths
    - err113  # Dynamic error checks - too strict
    - errcheck  # Too many false positives in v2, handled by code review

  # Linter-specific settings
  settings:
    govet:
      # Enable all analyzers
      enable-all: true
      disable:
        - shadow # Can be noisy
        - fieldalignment # Too noisy for existing code

    staticcheck:
      # Select specific checks
      checks: ["all"]

    misspell:
      # Correct spellings using locale preferences
      locale: US

    revive:
      # Enable all rules
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    gosec:
      # Select the severity to include in report
      severity: "medium"
      # Select the confidence to include in report
      confidence: "medium"

  # Exclusions for lint issues
  exclusions:
    # Mode of the generated files analysis
    generated: lax

    # Predefined exclusion presets
    presets:
      - comments
      - std-error-handling
      - common-false-positives

    # Exclusion rules
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - goconst
          - gocritic

      # Exclude known issues
      - linters:
          - staticcheck
        text: "SA9003:"

      # Allow unchecked errors in CLI commands (common pattern for CLI output)
      - path: "pkg/cli/.*\\.go"
        linters:
          - errcheck

      # Exclude gosec issues that are false positives for this project
      - linters:
          - gosec
        text: "G104|G115|G301|G304|G306|G706"

      # Exclude gocritic ifElseChain (style preference, not a bug)
      - linters:
          - gocritic
        text: "ifElseChain"

    # Which file paths to exclude
    paths:
      - bin
      - data
      - dist
      # Skip pkg/cli from certain linters via rules above

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      # Put imports beginning with prefix after 3rd-party packages
      local-prefixes:
        - github.com/abuiliazeed/gosearch

issues:
  # Show only new issues
  new: false

  # Maximum issues count per one linter
  max-issues-per-linter: 0

  # Maximum count of issues with the same text
  max-same-issues: 0

  # Make issues output unique by line
  uniq-by-line: true
