version: 2

run:
  timeout: 5m
  tests: true
  go: "1.24"

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gosec
    - revive
    - unconvert
    - unparam
    - prealloc
    - copyloopvar
  disable:
    - funlen
    - wsl
    - lll
    - err113
    - errcheck
    - gocyclo
    - godot
    - gocritic

formatters:
  enable:
    - gofumpt
    - goimports

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow

  staticcheck:
    checks: ["all"]

  misspell:
    locale: US

  revive:
    enable-all-rules: false
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  new: false
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  exclude-dirs:
    - bin
    - data
    - dist
  exclude-files:
    - ".*\\.pb\\.go$"
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosec]
    - linters: [staticcheck]
      text: "SA9003:"
  exclude-use-default: false
