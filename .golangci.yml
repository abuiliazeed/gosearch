# golangci-lint configuration for gosearch
# https://golangci-lint.run/usage/configuration/

run:
  # Timeout for analysis
  timeout: 5m

  # Include test files
  tests: true

  # Go version to use
  go: "1.24"

output:
  # Format: colored-line-number|line-number|json|tab|checkstyle|code-climate
  formats:
    - format: colored-line-number

  # Print lines of code with issue
  print-issued-lines: true

  # Print linter name in the end of issue text
  print-linter-name: true

  # Sort results by: filepath, line and column
  sort-results: true

linters:
  # Enable specific linters
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - goimports
    - misspell
    - gocritic
    - gosec
    - revive
    - stylecheck
    - unconvert
    - unparam
    - prealloc
    - copyloopvar

  # Disable specific linters
  disable:
    - funlen  # We have longer test functions
    - wsl     # Whitespace linter - too opinionated
    - lll     # Line length linter - we use reasonable line lengths
    - err113  # Dynamic error checks - too strict

linters-settings:
  govet:
    # Enable all analyzers
    enable-all: true
    disable:
      - shadow # Can be noisy

  errcheck:
    # Report about not checking of errors in type assertions: `a := b.(MyStruct)`
    check-type-assertions: true

    # Report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`
    check-blank: false

  staticcheck:
    # Select specific checks
    checks: ["all"]

  goimports:
    # Put imports beginning with prefix after 3rd-party packages
    local-prefixes: github.com/abuiliazeed/gosearch

  misspell:
    # Correct spellings using locale preferences
    locale: US

  revive:
    # Enable all rules
    enable-all-rules: false
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  gosec:
    # Select the severity to include in report
    severity: "medium"

    # Select the confidence to include in report
    confidence: "medium"

    # Exclude specific checks
    excludes:
      - G104  # Errors unchecked (we already use errcheck)
      - G307  # Deferring file close (our pattern is safe)

  stylecheck:
    # Check the names of exported symbols
    checked-subpackages: []

    # Select specific checks
    checks: ["all", "-ST1000", "-ST1003", "-ST1016"]
    # ST1000: Incorrect or missing package comment (we use our own convention)
    # ST1003: Capitalization (we allow project-specific terms)
    # ST1016: Methods on the same type should have the same receiver name (sometimes needed)

issues:
  # Show only new issues
  new: false

  # Maximum issues count per one linter
  max-issues-per-linter: 0

  # Maximum count of issues with the same text
  max-same-issues: 0

  # Make issues output unique by line
  uniq-by-line: true

  # Which dirs to skip
  exclude-dirs:
    - bin
    - data
    - dist

  # Which files to skip
  exclude-files:
    - ".*\\.pb\\.go$"

  # Exclude specific issues
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst

    # Exclude known issues
    - linters:
        - staticcheck
      text: "SA9003:"

    # Exclude some staticcheck messages
    - linters:
        - stylecheck
      text: "ST1000:"

  # Independently of option `exclude` we use default exclude patterns
  exclude-use-default: false
